<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đổi mật khẩu | DOCTORLOAN</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="js/tailwind-config.js"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="js/app.js"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-28">
<main class="space-y-6">
    <div class="flex items-center gap-3 pt-4">
        <a href="profile.html" class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center hover:bg-surface-container-high transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="font-extrabold text-xl tracking-tight">Đổi mật khẩu</h1>
    </div>

    <div class="bg-primary/5 border border-primary/20 rounded-2xl p-4 flex items-start gap-3">
        <span class="material-symbols-outlined text-primary flex-shrink-0 mt-0.5" style="font-variation-settings:'FILL' 1;">info</span>
        <p class="text-sm text-on-surface">Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ hoa, chữ thường và số.</p>
    </div>

    <div class="bg-white rounded-2xl p-5 border border-outline-variant/10 shadow-sm space-y-4">
        <div>
            <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Mật khẩu hiện tại</label>
            <div class="relative">
                <input type="password" id="current-pw" placeholder="Nhập mật khẩu hiện tại" class="w-full px-4 py-3 pr-12 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                <button onclick="togglePw('current-pw', this)" class="absolute right-4 top-1/2 -translate-y-1/2">
                    <span class="material-symbols-outlined text-on-surface-variant text-xl">visibility</span>
                </button>
            </div>
        </div>
        <div>
            <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Mật khẩu mới</label>
            <div class="relative">
                <input type="password" id="new-pw" placeholder="Nhập mật khẩu mới" class="w-full px-4 py-3 pr-12 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                <button onclick="togglePw('new-pw', this)" class="absolute right-4 top-1/2 -translate-y-1/2">
                    <span class="material-symbols-outlined text-on-surface-variant text-xl">visibility</span>
                </button>
            </div>
            <!-- Strength indicator -->
            <div class="flex gap-1.5 mt-2">
                <div class="flex-1 h-1 rounded-full bg-surface-container" id="s1"></div>
                <div class="flex-1 h-1 rounded-full bg-surface-container" id="s2"></div>
                <div class="flex-1 h-1 rounded-full bg-surface-container" id="s3"></div>
                <div class="flex-1 h-1 rounded-full bg-surface-container" id="s4"></div>
            </div>
        </div>
        <div>
            <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Xác nhận mật khẩu mới</label>
            <div class="relative">
                <input type="password" id="confirm-pw" placeholder="Nhập lại mật khẩu mới" class="w-full px-4 py-3 pr-12 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                <button onclick="togglePw('confirm-pw', this)" class="absolute right-4 top-1/2 -translate-y-1/2">
                    <span class="material-symbols-outlined text-on-surface-variant text-xl">visibility</span>
                </button>
            </div>
        </div>
    </div>

    <button class="w-full py-3.5 brand-gradient text-white font-bold rounded-2xl hover:opacity-90 active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-lg">lock_reset</span>Cập nhật mật khẩu
    </button>
</main>
<script>
    function togglePw(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('.material-symbols-outlined');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }
    document.getElementById('new-pw').addEventListener('input', function() {
        const v = this.value;
        const colors = ['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-500'];
        const filled = Math.min(4, Math.floor(v.length / 3));
        for (let i = 1; i <= 4; i++) {
            const el = document.getElementById('s'+i);
            el.className = 'flex-1 h-1 rounded-full ' + (i <= filled ? colors[filled-1] : 'bg-surface-container');
        }
    });
</script>
</body>
</html>
