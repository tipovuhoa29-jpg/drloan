<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Thông tin cá nhân | DOCTORLOAN</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="js/tailwind-config.js"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="js/app.js"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-28">
<main class="space-y-6">
    <div class="flex items-center gap-3 pt-4">
        <a href="profile.html" class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center hover:bg-surface-container-high transition-colors flex-shrink-0">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="font-extrabold text-xl tracking-tight">Thông tin cá nhân</h1>
    </div>

    <!-- Avatar -->
    <div class="bg-white rounded-2xl p-6 border border-outline-variant/10 shadow-sm flex flex-col items-center gap-4">
        <div class="relative">
            <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-primary/20">
                <img class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Minh+Tuan&background=ff7500&color=fff&size=200" alt="Avatar">
            </div>
            <button class="absolute bottom-0 right-0 w-8 h-8 brand-gradient rounded-full flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-white text-sm">photo_camera</span>
            </button>
        </div>
        <p class="text-sm text-tertiary">Nhấn để thay ảnh đại diện</p>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-2xl p-5 border border-outline-variant/10 shadow-sm space-y-4">
        <p class="text-[10px] font-black uppercase tracking-[0.15em] text-on-surface-variant/60">Thông tin cơ bản</p>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Họ và tên</label>
                <input type="text" value="Nguyễn Minh Tuấn" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary/40 font-medium">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Số điện thoại</label>
                    <input type="tel" value="0901 234 567" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                </div>
                <div>
                    <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Ngày sinh</label>
                    <input type="date" value="1990-05-15" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                </div>
            </div>
            <div>
                <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Email</label>
                <input type="email" value="minhtuan@gmail.com" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
            </div>
            <div>
                <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Địa chỉ</label>
                <input type="text" value="123 Nguyễn Trãi, Quận 1, TP.HCM" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl p-5 border border-outline-variant/10 shadow-sm space-y-4">
        <p class="text-[10px] font-black uppercase tracking-[0.15em] text-on-surface-variant/60">Thông tin ngân hàng</p>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Ngân hàng</label>
                <select class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium text-on-surface-variant">
                    <option>Vietcombank</option><option>Techcombank</option><option>MB Bank</option><option>VPBank</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Số tài khoản</label>
                    <input type="text" value="0123456789" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                </div>
                <div>
                    <label class="text-xs font-bold text-on-surface-variant mb-1.5 block">Chủ tài khoản</label>
                    <input type="text" value="NGUYEN MINH TUAN" class="w-full px-4 py-3 text-sm bg-surface-container-low border border-outline-variant/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 font-medium">
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-md border-t border-outline-variant/10 p-4 pb-safe lg:pl-[calc(240px+1rem)] flex justify-center">
        <button class="w-full max-w-lg flex items-center justify-center gap-2 py-3.5 brand-gradient text-white font-bold rounded-2xl hover:opacity-90 active:scale-[0.98] transition-all shadow-md">
            <span class="material-symbols-outlined text-lg">save</span>Lưu thay đổi
        </button>
    </div>
</main>
</body>
</html>
